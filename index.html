<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GitCo - 코딩 교육 플랫폼</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.0/full/pyodide.js"></script>
    <style>
        :root { --bg: #0f172a; --glass: rgba(30, 41, 59, 0.7); --accent: #3b82f6; --success: #10b981; --fail: #ef4444; --text: #f8fafc; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
        .nav-tabs { display: flex; gap: 10px; }
        .nav-tab { padding: 10px 20px; border-radius: 8px; cursor: pointer; color: #94a3b8; font-weight: 600; border: none; background: transparent; }
        .nav-tab.active { background: var(--accent); color: white; }
        .view-container { display: none; flex: 1; padding: 20px; gap: 20px; }
        .view-container.active { display: flex; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        input, textarea { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 8px; }
        button { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 800; font-size: 20px;">GitCo Integrated</div>
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchTab('lms')">🎓 학습 모드</button>
        <button class="nav-tab" onclick="switchTab('studio')">✍️ 문제 만들기</button>
    </div>
</header>

<div id="view-lms" class="view-container active">
    <div id="sidebar" class="glass-panel" style="width: 320px;">
        <input type="text" id="scriptUrl" placeholder="구글 앱스크립트 URL">
        <input type="text" id="className" placeholder="반 이름">
        <input type="text" id="studentId" placeholder="아이디">
        <input type="password" id="studentPw" placeholder="비밀번호">
        <button onclick="loginSystem()">로그인 / 접속</button>
        <hr style="width:100%; border: 0.1px solid #334155;">
        <input type="text" id="repoInput" placeholder="user/repo" value="yourgithub/GitCo-Data">
        <button onclick="loadCurriculum()" style="background:#475569">레포지토리 불러오기</button>
        <div id="fileList" style="overflow-y: auto; flex: 1;"></div>
    </div>
    <div id="main" class="glass-panel" style="flex: 2;">
        <h2 id="problemTitle">문제를 선택하세요</h2>
        <div id="problemDescription" class="glass-panel">설명이 여기에 나타납니다.</div>
        <textarea id="codeEditor" style="flex: 1; font-family: monospace;" placeholder="코드 작성..."></textarea>
        <button onclick="executeCode()" style="background:var(--success)">제출 및 채점</button>
    </div>
    <div id="reportSection" class="glass-panel" style="flex: 1;">
        <h3>학습 리포트</h3>
        <div id="historyContainer"></div>
    </div>
</div>

<div id="view-studio" class="view-container">
    <div class="glass-panel" style="flex:1;">
        <h3>문제 설정</h3>
        <input type="text" id="s_title" placeholder="문제 제목" oninput="generateCode()">
        <input type="number" id="s_score" placeholder="배점" oninput="generateCode()">
        <textarea id="s_desc" placeholder="문제 설명 (이미지 링크는 [이미지: URL]로 삽입)" oninput="generateCode()"></textarea>
        <textarea id="s_code" placeholder="정답 코드 작성" oninput="generateCode()"></textarea>
    </div>
    <div class="glass-panel" style="flex:1;">
        <h3>코드 생성기</h3>
        <textarea id="outputCode" style="flex:1;" readonly></textarea>
        <button onclick="downloadPy()" style="background:var(--success)">.py 파일 다운로드</button>
    </div>
</div>

<script>
    let pyodide;
    let originalMasterCode = "";
    let currentProblemName = "";
    let currentUser = "";

    async function init() { pyodide = await loadPyodide(); }
    init();

    function switchTab(tabId) {
        document.querySelectorAll('.view-container').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(e => e.classList.remove('active'));
        document.getElementById('view-' + tabId).classList.add('active');
        event.target.classList.add('active');
    }

    // [LMS] Logic
    async function loadCurriculum() {
        const repo = document.getElementById('repoInput').value;
        const res = await fetch(`https://api.github.com/repos/${repo}/contents/`);
        const files = await res.json();
        const listDiv = document.getElementById('fileList');
        listDiv.innerHTML = '';
        files.filter(f => f.name.endsWith('.py')).forEach(f => {
            const btn = document.createElement('button');
            btn.className = 'prob-btn';
            btn.style.width = "100%"; btn.style.marginBottom="5px";
            btn.innerText = f.name;
            btn.onclick = () => loadProblem(f.download_url, f.name);
            listDiv.appendChild(btn);
        });
    }

    async function loadProblem(url, fileName) {
        const res = await fetch(url);
        originalMasterCode = await res.text();
        const descMatch = originalMasterCode.match(/#\s*(?:설명):\s*([\s\S]*?)(?=\n[^#])/i);
        let desc = descMatch ? descMatch[1].replace(/\[이미지:\s*(.+?)\]/g, '<img src="$1" style="max-width:100%; display:block; margin:10px 0;">') : "설명 없음";
        document.getElementById('problemTitle').innerText = fileName;
        document.getElementById('problemDescription').innerHTML = desc;
    }

    async function executeCode() {
        const studentCode = document.getElementById('codeEditor').value;
        await pyodide.runPythonAsync(`import sys, io\nsys.stdout = io.StringIO()`);
        await pyodide.runPythonAsync(originalMasterCode);
        const masterOut = pyodide.runPython("sys.stdout.getvalue()").trim();
        await pyodide.runPythonAsync(`sys.stdout = io.StringIO()`);
        await pyodide.runPythonAsync(studentCode);
        const studentOut = pyodide.runPython("sys.stdout.getvalue()").trim();
        
        const isCorrect = (masterOut === studentOut);
        alert(isCorrect ? "정답입니다!" : "오답입니다.");
        
        // 시트 전송 로직 (로그인 시에만)
        const url = document.getElementById('scriptUrl').value;
        if(currentUser && url) {
            fetch(url, { method: "POST", body: JSON.stringify({ action: "record_score", repoName: document.getElementById('repoInput').value, className: document.getElementById('className').value, userId: document.getElementById('studentId').value, probName: currentProblemName, status: isCorrect ? "정답" : "오답" }) });
        }
    }

    // [Studio] Logic
    function generateCode() {
        const title = document.getElementById('s_title').value;
        const desc = document.getElementById('s_desc').value;
        const code = document.getElementById('s_code').value;
        document.getElementById('outputCode').value = `# 문제: ${title}\n# 설명:\n# ${desc.replace(/\n/g, '\n# ')}\n\n${code}`;
    }

    function downloadPy() {
        const blob = new Blob([document.getElementById('outputCode').value], { type: "text/x-python" });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "problem.py"; a.click();
    }
</script>
</body>
</html>
