<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GitHub 문제 풀이 서비스</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.0/full/pyodide.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 300px; border-right: 1px solid #ccc; padding: 10px; overflow-y: auto; }
        #main { flex: 1; padding: 20px; }
        textarea { width: 100%; height: 200px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>문제 목록 (GitHub)</h3>
    <input type="text" id="repoInput" placeholder="user/repo" value="yourname/repo">
    <button onclick="loadRepo()">불러오기</button>
    <div id="fileList"></div>
</div>

<div id="main">
    <h2 id="problemTitle">문제를 선택하세요</h2>
    <textarea id="codeEditor" placeholder="여기에 파이썬 코드를 작성하세요..."></textarea>
    <button onclick="runCode()">채점하기</button>
    <pre id="result"></pre>
</div>

<script>
    let pyodide;
    async function init() { pyodide = await loadPyodide(); }
    init();

    async function loadRepo() {
        const repo = document.getElementById('repoInput').value;
        const res = await fetch(`https://api.github.com/repos/${repo}/contents/`);
        const files = await res.json();
        const listDiv = document.getElementById('fileList');
        listDiv.innerHTML = '';
        files.filter(f => f.name.endsWith('.ipynb')).forEach(f => {
            const btn = document.createElement('div');
            btn.innerHTML = `<button onclick="loadProblem('${f.download_url}')">${f.name}</button>`;
            listDiv.appendChild(btn);
        });
    }

    async function loadProblem(url) {
        const res = await fetch(url);
        const data = await res.json();
        const firstCell = data.cells.find(c => c.cell_type === 'code');
        const source = firstCell.source.join('');
        const match = source.match(/#\s*문제명:\s*(.*)/);
        document.getElementById('problemTitle').innerText = match ? match[1] : "이름 없음";
        document.getElementById('codeEditor').value = source;
    }

    async function runCode() {
        const code = document.getElementById('codeEditor').value;
        const resultDiv = document.getElementById('result');
        try {
            const output = await pyodide.runPythonAsync(code);
            resultDiv.innerText = "결과: " + (output !== undefined ? output : "실행 완료(출력 없음)");
        } catch (err) {
            resultDiv.innerText = "에러: " + err;
        }
    }
</script>
</body>
</html>
