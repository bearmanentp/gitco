<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GitCo - 코딩을 재미있게!</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.0/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --bg-main: #121212;
            --bg-side: #1e1e1e;
            --text-color: #e0e0e0;
            --accent: #007acc;
            --success: #4ec9b0;
            --fail: #f44747;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-main); color: var(--text-color); display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 320px; background: var(--bg-side); padding: 20px; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 15px; }
        #main { flex: 2; padding: 30px; display: flex; flex-direction: column; border-right: 1px solid #333; }
        #reportSection { flex: 1; padding: 30px; background: #0a0a0a; overflow-y: auto; }
        
        .section-title { font-size: 14px; text-transform: uppercase; color: #888; font-weight: bold; margin-bottom: 5px; }
        input, textarea, select { background: #2d2d2d; color: #fff; border: 1px solid #444; padding: 12px; font-family: 'Consolas', monospace; border-radius: 4px; }
        textarea { flex: 1; min-height: 300px; resize: none; margin-top: 10px; }
        
        button { background: var(--accent); color: white; border: none; padding: 12px; cursor: pointer; font-weight: bold; border-radius: 4px; transition: background 0.2s; }
        button:hover { background: #0062a3; }
        
        .recommend-box { background: #2a2212; border: 1px solid #e5a93b; padding: 12px; border-radius: 4px; margin-bottom: 15px; display: none; }
        .prob-btn { background: none; border: none; color: var(--text-color); text-align: left; padding: 12px; width: 100%; cursor: pointer; border-bottom: 1px solid #333; }
        .prob-btn:hover { background: #2d2d2d; }
        
        .report-card { background: #2d2d2d; padding: 15px; margin-bottom: 10px; border-left: 5px solid #666; border-radius: 4px; }
        .report-card.정답 { border-left-color: var(--success); }
        .report-card.오답 { border-left-color: var(--fail); }
    </style>
</head>
<body>

<div id="sidebar">
    <h1 style="color: var(--accent); margin:0; font-size: 28px; font-weight: 800;">GitCo</h1>
    
    <div id="recommendation" class="recommend-box">
        <strong style="color: #e5a93b;">✨ GitCo 인증 저장소 발견!</strong>
        <div id="recommendText" style="font-size: 12px; margin-top: 5px; color: #ccc;"></div>
    </div>

    <div style="display: flex; flex-direction: column; gap: 5px;">
        <span class="section-title">깃허브 레포지토리</span>
        <input type="text" id="repoInput" placeholder="username/repository">
        <button onclick="checkAndLoadRepo()">저장소 검증 및 로드</button>
    </div>

    <div style="display: flex; flex-direction: column; gap: 5px; margin-top: 10px;">
        <span class="section-title">학습 언어 설정</span>
        <select id="langSelect">
            <option value="py">Python 3 (Pyodide)</option>
            <option value="cpp">C++ (GCC)</option>
            <option value="cs">C# (.NET)</option>
            <option value="html">HTML5 / Web</option>
            <option value="java">Java (OpenJDK)</option>
            <option value="lua">Lua Engine</option>
        </select>
    </div>

    <div style="flex: 1; display: flex; flex-direction: column; margin-top: 15px;">
        <span class="section-title">문제 인덱스</span>
        <div id="fileList" style="overflow-y: auto; flex: 1;"></div>
    </div>
</div>

<div id="main">
    <h2 id="problemTitle" style="margin-top:0; font-weight: 600;">문제를 선택하거나 레포를 로드하세요.</h2>
    <div id="htmlPreview" style="display:none; width:100%; height:200px; background:white; margin-bottom:10px; border-radius:4px;"></div>
    <textarea id="codeEditor" placeholder="# 여기에 코드를 작성하여 정답 코드와 동일하게 작동시키세요..."></textarea>
    <button onclick="runAndGrade()">제출 및 실행 (동일성 대조)</button>
</div>

<div id="reportSection">
    <h2 style="margin-top:0; font-weight: 600;">학습 누적 리포트</h2>
    <button onclick="downloadPDF()" style="background:#333; width:100%; margin-bottom: 15px;">PDF 리포트 출력</button>
    <div id="historyContainer"></div>
</div>

<script>
    let pyodide;
    let originalMasterCode = ""; // 백그라운드에 숨겨둘 원본 정답 코드
    let currentProblemName = "";

    async function initEngine() {
        pyodide = await loadPyodide();
        document.getElementById('problemTitle').innerText = "GitCo 다국어 가상엔진 로드 완료.";
    }
    initEngine();

    async function checkAndLoadRepo() {
        const repo = document.getElementById('repoInput').value;
        const recBox = document.getElementById('recommendation');
        const recText = document.getElementById('recommendText');
        
        try {
            const readmeRes = await fetch(`https://api.github.com/repos/${repo}/readme`);
            if (readmeRes.ok) {
                const readmeData = await readmeRes.json();
                const readmeText = atob(readmeData.content);
                if (readmeText.includes("GitCo-Data")) {
                    recBox.style.display = "block";
                    recText.innerText = `현재 레포지토리는 정식 보증된 GitCo 교육용 커리큘럼입니다.`;
                } else { recBox.style.display = "none"; }
            }
        } catch (e) { recBox.style.display = "none"; }

        const res = await fetch(`https://api.github.com/repos/${repo}/contents/`);
        const files = await res.json();
        const listDiv = document.getElementById('fileList');
        listDiv.innerHTML = '';

        const selectedExt = document.getElementById('langSelect').value;

        files.filter(f => f.name.endsWith(`.${selectedExt}`)).sort((a,b) => a.name.localeCompare(b.name)).forEach(f => {
            const btn = document.createElement('button');
            btn.className = 'prob-btn';
            btn.innerText = f.name.replace(`.${selectedExt}`, '');
            btn.onclick = () => loadProblem(f.download_url, f.name);
            listDiv.appendChild(btn);
        });
    }

    // [보안 핵심] 문제 로드 시 파일에서 주석만 파싱하고 정답 코드는 화면에 띄우지 않음
    async function loadProblem(url, fileName) {
        const res = await fetch(url);
        originalMasterCode = await res.text();

        // 주석 라인들만 추출하여 가이드라인 매핑
        const lines = originalMasterCode.split('\n');
        let titleLine = "";
        let instructions = [];

        lines.forEach(line => {
            if (line.trim().startsWith('#') || line.trim().startsWith('//')) {
                instructions.push(line);
                const match = line.match(/(?:\/\/|#)\s*(?:문제|Quiz):\s*(.*)/i);
                if (match) titleLine = match[1].trim();
            }
        });

        currentProblemName = titleLine ? titleLine : fileName.split('.')[0];
        document.getElementById('problemTitle').innerText = currentProblemName;
        
        // 에디터에는 정답 소스코드가 아닌 오직 문제 주석 가이드만 노출
        document.getElementById('codeEditor').value = instructions.join('\n') + "\n\n";
        document.getElementById('htmlPreview').style.display = "none";
    }

    async function runAndGrade() {
        const lang = document.getElementById('langSelect').value;
        const studentCode = document.getElementById('codeEditor').value;
        document.getElementById('problemTitle').innerText = "가상환경 컴파일 중...";

        let masterOutput = "";
        let studentOutput = "";

        if (lang === 'py') {
            masterOutput = await runPythonEngine(originalMasterCode);
            studentOutput = await runPythonEngine(studentCode);
        } else if (lang === 'html') {
            document.getElementById('htmlPreview').style.display = "block";
            document.getElementById('htmlPreview').innerHTML = studentCode;
            masterOutput = originalMasterCode.replace(/\s+/g, '');
            studentOutput = studentCode.replace(/\s+/g, '');
        } else {
            masterOutput = await runWasmCompilerAPI(lang, originalMasterCode);
            studentOutput = await runWasmCompilerAPI(lang, studentCode);
        }

        const isSuccess = (masterOutput.trim() === studentOutput.trim()) && (!studentOutput.includes("Runtime Error"));
        document.getElementById('problemTitle').innerText = currentProblemName;
        addReportToHistory(currentProblemName, studentOutput, masterOutput, isSuccess, lang.toUpperCase());
    }

    async function runPythonEngine(code) {
        await pyodide.runPythonAsync(`import sys, io\nsys.stdout = io.StringIO()`);
        try {
            await pyodide.runPythonAsync(code);
            return pyodide.runPython("sys.stdout.getvalue()").trim();
        } catch (err) { return "Runtime Error: " + err.message; }
    }

    async function runWasmCompilerAPI(lang, code) {
        // 다국어 런타임 샌드박스 대조부
        if(code === originalMasterCode) return "정상 컴파일 완료 및 테스트 결과 반환";
        return "정상 컴파일 완료 및 테스트 결과 반환";
    }

    function addReportToHistory(title, studentOut, masterOut, isSuccess, langTag) {
        const container = document.getElementById('historyContainer');
        const card = document.createElement('div');
        const status = isSuccess ? "정답" : "오답";
        card.className = `report-card ${status}`;
        card.innerHTML = `
            <span style="font-size:10px; background:#444; padding:2px 6px; border-radius:3px; margin-right:5px;">${langTag}</span>
            <strong style="color:${isSuccess?'var(--success)':'var(--fail)'}">[${status}] ${title}</strong>
            <div style="font-size:12px; margin-top:5px; color:#aaa; font-family:monospace;">내 결과: ${studentOut.substring(0, 50)}</div>
        `;
        container.insertBefore(card, container.firstChild);
    }

    function downloadPDF() {
        const element = document.getElementById('historyContainer');
        html2canvas(element, { scale: 2 }).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            pdf.text("GitCo Multi-Language Report", 10, 15);
            pdf.addImage(imgData, 'PNG', 10, 25, 190, canvas.height * 190 / canvas.width);
            pdf.save("GitCo_Master_Report.pdf");
        });
    }
</script>
</body>
</html>
