<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GitCo - 자동 채점 시스템</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.0/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://raw.githubusercontent.com/parallax/jsPDF/master/fontconverter/fontconverter.js"></script>
</head>
<body>
    <script>
        let solvedHistory = []; // 풀이 결과 누적용 배열

        async function runAndGrade(expectedOutput) {
            const code = document.getElementById('codeEditor').value;
            const resDiv = document.getElementById('result');
            
            // 1. 코드 실행 후 결과 캡처
            await pyodide.runPythonAsync(`
                import sys, io
                sys.stdout = io.StringIO()
                try:
                    ${code}
                    output = sys.stdout.getvalue()
                except Exception as e:
                    output = str(e)
            `);
            
            const output = pyodide.runPython("output").trim();
            const isCorrect = (output === expectedOutput.toString());
            
            // 2. 결과 누적
            const resultRecord = {
                title: document.getElementById('problemTitle').innerText,
                output: output,
                status: isCorrect ? "정답" : "오답"
            };
            solvedHistory.push(resultRecord);
            
            resDiv.innerText = `결과: ${output} (${resultRecord.status})`;
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // PDF 한글 깨짐 해결: 
            // 1. jsPDF에서 한글 폰트 등록 필요 (doc.addFont)
            // 2. 혹은 HTML을 캔버스로 변환하여 이미지로 PDF에 삽입하는 방식 권장
            doc.text("GitCo Learning Report", 10, 10);
            solvedHistory.forEach((item, index) => {
                doc.text(`${index+1}. ${item.title}: ${item.status} (Output: ${item.output})`, 10, 20 + (index * 10));
            });
            doc.save("GitCo_Report.pdf");
        }
    </script>
</body>
</html>
